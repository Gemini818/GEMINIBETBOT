name: Bot Calcio Auto

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # ✅ Aggiornato a v4 (Node.js 24 ready)
      - uses: actions/checkout@v4
      
      # ✅ Aggiornato a v5 (Node.js 24 ready)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Libs
        run: pip install -r requirements.txt
      
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python bot.py
